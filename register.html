<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Регистрация</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <h2>Регистрация пользователя</h2>
        <form id="regForm">
            <input type="text" id="name" placeholder="Введите имя" required><br>
            <input type="text" id="second_name" placeholder="Введите фамилию" required><br>
            <input type="text" id="patronymic" placeholder="Введите отчество" required><br>
            <input type="text" id="email" placeholder="Введите email" required><br>
            <input type="date" id="birthday" value="2000-01-01" required><br>
            <input type="number" id="current_balance" placeholder="Введите баланс" step="0.1" required><br>
            <input type="text" id="password" placeholder="Введите пароль из 8 символов" required><br>
            <button type="submit" id="reg">Добавить пользователя</button>
        </form>
        <div id="message"></div>
        <script src="scriptReg.js"></script>
    </body>
</html>
